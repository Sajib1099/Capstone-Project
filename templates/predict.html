<!DOCTYPE html>
<html>
<head>
    <title>Prediction | Decision Insight AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Decision Insight AI</div>
    <a href="index.html" class="nav-btn">Home</a>
</nav>

<div class="form-container">

    <h2>Decision Regret Risk Analysis</h2>

    <form id="predictionForm">

        <label>Age</label>
        <input type="number" id="age" min="15" max="80" required>

        <label>Confidence Level</label>
        <select id="confidence" required>
            <option value="">Select</option>
            <option value="2">Low (1-3)</option>
            <option value="5">Moderate (4-5)</option>
            <option value="7">High Moderate (6-8)</option>
            <option value="9">High (9-10)</option>
        </select>

        <label>Emotional Stability</label>
        <select id="emotion" required>
            <option value="">Select</option>
            <option value="2">Unstable</option>
            <option value="5">Moderate</option>
            <option value="8">Very Stable</option>
        </select>

        <label>External Pressure</label>
        <select id="pressure" required>
            <option value="">Select</option>
            <option value="1">Low</option>
            <option value="3">Moderate</option>
            <option value="5">High</option>
        </select>

        <label>Satisfaction Level</label>
        <select id="satisfaction" required>
            <option value="">Select</option>
            <option value="2">Low</option>
            <option value="5">Neutral</option>
            <option value="8">High</option>
        </select>

        <button type="submit">Run Analysis</button>

    </form>

    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
